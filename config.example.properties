# GetGoat map configuration — EXAMPLE FILE
# Copy to config.properties and fill in your values

# Grid resolution in degrees. Must evenly divide 180 and 360.
# 0.015625 = 11520×23040 = 265M cells (~1.7km at equator)
# 0.03125  = 5760×11520  = 66M cells  (~3.5km at equator)
# 0.0625   = 2880×5760   = 16M cells  (~7km)
grid.cellSizeDegrees=0.015625

# Relief classification thresholds
relief.elevThreshold=500
relief.roughThreshold=60

# Terrain GeoTIFF paths (primary → fallback)
terrain.reliefTiff=src/main/resources/geodata/elevation/HYP_HR_SR_OB_DR.tif
terrain.fallbackTiff=src/main/resources/geodata/elevation/HYP_50M_SR_W.tif

# HSV color rules
terrain.colorsJson=src/main/resources/geodata/terrain-colors.json

# Shapefile paths
roads.shapefile=roads/ne_10m_roads.shp
rivers.shapefile=rivers/ne_10m_rivers_lake_centerlines.shp

# Workspace directory (campaign scenario data)
workspace.dir=workspaces/taierzhuang-1938

# Admin data (GeoJSON)
admin.provincesJson=ne_10m_admin_1_states_provinces.json
admin.citiesJson=ne_10m_populated_places.json

# LLM configuration (global — shared by all commanders)
llm.provider=anthropic
llm.model=claude-sonnet-4-6
llm.endpoint=
llm.apiKey=env:ANTHROPIC_API_KEY
llm.maxTokens=4096
